{% extends "base.html" %}
{% block title %}Login — GusTico{% endblock %}
{% block content %}
<div style="max-width:360px;margin:80px auto;text-align:center">
<div style="width:48px;height:48px;background:var(--vm);border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;margin-bottom:16px">GT</div>
<h2 style="font-size:22px;font-weight:700;margin-bottom:4px">GusTico</h2>
<p style="font-size:12px;color:var(--txt3);margin-bottom:24px">Acesso restrito</p>
<div class="card" style="text-align:left">
{% with msgs=get_flashed_messages(with_categories=True) %}{% for cat,msg in msgs %}<div class="alert alert-{{cat}}">{{msg}}</div>{% endfor %}{% endwith %}
<form method="POST" autocomplete="off">
<div class="form-group"><label>Senha</label><input type="password" name="senha" class="inp" placeholder="••••••••" required autofocus autocomplete="new-password"></div>
<button type="submit" class="btn btn-vm" style="width:100%;justify-content:center;padding:10px">Entrar</button>
</form></div>
<a href="/" style="font-size:12px;color:var(--txt3)">← Voltar</a>
</div>
{% endblock %}
